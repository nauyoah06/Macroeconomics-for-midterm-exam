<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中级宏观经济学刷题</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#222535;--bg4:#2a2e42;
  --text:#e8eaf0;--text2:#9ba3bf;--text3:#6b7494;
  --border:#2e3350;--border2:#3d4570;
  --green:#3dba7c;--green-bg:#0d2d1e;--green-dim:#1a4a32;
  --red:#e05a5a;--red-bg:#2d0d0d;--red-dim:#4a1a1a;
  --blue:#4e7ef7;--amber:#f5a623;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:var(--blue)}
/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sidebar-header{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.app-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.app-sub{font-size:11px;color:var(--text3)}
.chapter-list{padding:8px 0;flex:1}
.chapter-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;transition:background .15s;font-size:13px;color:var(--text2);position:relative}
.chapter-item:hover{background:var(--bg3)}
.chapter-item.active{background:var(--bg3);color:var(--text)}
.chapter-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chapter-name{flex:1;font-size:13px}
.chapter-count{font-size:11px;color:var(--text3)}
.chapter-prog{position:absolute;bottom:0;left:0;height:2px;background:var(--green);opacity:.6;transition:width .3s}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.mixed-btn{width:100%;padding:8px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.mixed-btn:hover{background:var(--bg3);color:var(--text)}
.mixed-btn.active{background:var(--bg4);color:var(--text);border-color:var(--blue)}
/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg2);flex-wrap:wrap}
.chapter-tag{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--bg4)}
.score-display{font-size:13px;color:var(--text2);margin-left:auto}
.score-num{color:var(--text);font-weight:600}
.ctrl-btns{display:flex;gap:6px}
.ctrl-btn{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.ctrl-btn:hover{background:var(--bg3);color:var(--text)}
.ctrl-btn.on{background:var(--bg4);color:var(--text);border-color:var(--blue)}
/* PROGRESS */
.prog-wrap{height:3px;background:var(--border);position:relative}
.prog-fill{height:100%;background:var(--green);transition:width .4s;position:relative}
/* QUESTION */
.qcard{flex:1;padding:28px 24px;max-width:780px;width:100%;margin:0 auto}
.qnum{font-size:12px;color:var(--text3);margin-bottom:10px}
.qtxt{font-size:16px;color:var(--text);line-height:1.7;margin-bottom:22px;font-weight:400}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .15s;text-align:left;font-size:14px;color:var(--text2);width:100%;line-height:1.55}
.opt:hover:not([disabled]){border-color:var(--border2);background:var(--bg3);color:var(--text)}
.opt[disabled]{cursor:default}
.opt-lbl{font-weight:600;min-width:20px;font-size:13px;opacity:.7}
.opt.correct{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.opt.correct .opt-lbl{color:var(--green);opacity:1}
.opt.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.opt.wrong .opt-lbl{color:var(--red);opacity:1}
.opt.reveal{border-color:var(--green);background:var(--green-dim)}
.opt.reveal .opt-lbl{color:var(--green);opacity:1}
/* FEEDBACK */
.fb{font-size:14px;min-height:20px;margin-bottom:16px;color:var(--text3)}
.fb.ok{color:var(--green)}
.fb.no{color:var(--red)}
/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:8px;border-top:1px solid var(--border);margin-top:8px}
.nav-btn{padding:9px 20px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:14px;transition:all .15s}
.nav-btn:hover:not([disabled]){background:var(--bg3);color:var(--text)}
.nav-btn[disabled]{opacity:.3;cursor:default}
.nav-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.nav-btn.primary:hover:not([disabled]){opacity:.85}
/* END SCREEN */
.end{padding:40px 24px;max-width:600px;margin:0 auto;text-align:center}
.end-pct{font-size:56px;font-weight:700;line-height:1.1;margin-bottom:8px}
.end-grade{font-size:16px;color:var(--text2);margin-bottom:28px}
.end-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.end-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.end-n{font-size:26px;font-weight:700}
.end-l{font-size:11px;color:var(--text3);margin-top:3px}
.end-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
/* WELCOME */
.welcome{padding:40px 24px;max-width:600px;margin:0 auto;text-align:center}
.welcome h1{font-size:28px;font-weight:700;margin-bottom:8px}
.welcome p{color:var(--text2);font-size:15px;margin-bottom:28px}
.chapter-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:28px;text-align:left}
.ccard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s}
.ccard:hover{border-color:var(--border2);background:var(--bg3)}
.ccard-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px}
.ccard-name{font-size:13px;font-weight:600;margin-bottom:4px}
.ccard-count{font-size:12px;color:var(--text3)}
/* RESPONSIVE */
@media(max-width:620px){
  .sidebar{display:none}
  .chapter-cards{grid-template-columns:1fr}
  .end-cards{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

      <div class="app-title">宏观经济学</div>

    <div id="content"></div>
  </div>
</div>

<script id="mainScript">
// ===== STATE =====
let deck = [];
let wrongIds = {}; // keyed by "chapterId_qIdx"
let mode = 'chapter'; // 'chapter' | 'mixed' | 'wrong'
let shuffled = false;
let wrongOnly = false;
let curChapterId = null;
let idx = 0, correct = 0, answered = 0;
let answeredThis = false;
let chapterProgress = {}; // { chId: { correct, answered, done } }

const LABELS = ['A','B','C','D'];
const COLORS = ['#3dba7c','#4e7ef7','#f5a623','#e05a5a','#a855f7','#06b6d4','#ec4899'];

// ===== INIT =====
function init() {
  buildSidebar();
  showWelcome();
}

function buildSidebar() {
  const list = document.getElementById('chapterList');
  list.innerHTML = '';
  CHAPTERS.forEach((ch, i) => {
    const p = chapterProgress[ch.id] || {};
    const pct = p.answered > 0 ? Math.round((p.correct / p.answered) * 100) : 0;
    const div = document.createElement('div');
    div.className = 'chapter-item' + (curChapterId === ch.id && mode !== 'mixed' ? ' active' : '');
    div.innerHTML = `
      <span class="chapter-dot" style="background:${COLORS[i % COLORS.length]}"></span>
      <span class="chapter-name">${ch.title}</span>
      <span class="chapter-count">${ch.questions.length}题</span>
      ${p.answered ? `<div class="chapter-prog" style="width:${Math.min(100, Math.round((idx+1)/deck.length*100))}%"></div>` : ''}
    `;
    div.onclick = () => startChapter(ch.id);
    list.appendChild(div);
  });
  const mixBtn = document.getElementById('mixedBtn');
  if (mixBtn) mixBtn.className = 'mixed-btn' + (mode === 'mixed' ? ' active' : '');
}

function showWelcome() {
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('progWrap').style.display = 'none';
  const totalQ = CHAPTERS.reduce((s, c) => s + c.questions.length, 0);
  let html = `<div class="welcome">
    <h1>中级宏观经济学</h1>
    <p>共 7 章，${totalQ} 道选择题。选择章节开始练习，或混合练习全部题目。</p>
    <div class="chapter-cards">`;
  CHAPTERS.forEach((ch, i) => {
    html += `<div class="ccard" onclick="startChapter(${ch.id})">
      <div class="ccard-name"><span class="ccard-dot" style="background:${COLORS[i%COLORS.length]}"></span>${ch.title}</div>
      <div class="ccard-count">${ch.questions.length} 道选择题</div>
    </div>`;
  });
  html += `</div>
    <button class="nav-btn primary" onclick="startMixed()" style="font-size:14px;padding:10px 24px">🔀 混合练习全部 ${totalQ} 题</button>
  </div>`;
  document.getElementById('content').innerHTML = html;
}

function startChapter(chId) {
  curChapterId = chId;
  mode = 'chapter';
  wrongOnly = false;
  idx = 0; correct = 0; answered = 0; answeredThis = false;
  const ch = CHAPTERS.find(c => c.id === chId);
  deck = ch.questions.map((q, i) => ({...q, _key: `${chId}_${i}`}));
  if (shuffled) deck.sort(() => Math.random() - .5);
  updateTopbar();
  buildSidebar();
  render();
}

function startMixed() {
  mode = 'mixed';
  curChapterId = null;
  wrongOnly = false;
  idx = 0; correct = 0; answered = 0; answeredThis = false;
  deck = [];
  CHAPTERS.forEach(ch => {
    ch.questions.forEach((q, i) => {
      deck.push({...q, _key: `${ch.id}_${i}`, _chId: ch.id});
    });
  });
  deck.sort(() => Math.random() - .5);
  shuffled = true;
  updateTopbar();
  buildSidebar();
  render();
}

function toggleShuffle() {
  shuffled = !shuffled;
  document.getElementById('shuffleBtn').className = 'ctrl-btn' + (shuffled ? ' on' : '');
  if (deck.length > 0) {
    if (wrongOnly) startWrongOnly();
    else if (mode === 'chapter') startChapter(curChapterId);
    else startMixed();
  }
}

function toggleWrong() {
  const wCount = Object.keys(wrongIds).length;
  if (wCount === 0) { alert('暂无错题！'); return; }
  wrongOnly = !wrongOnly;
  if (wrongOnly) startWrongOnly();
  else {
    wrongOnly = false;
    if (mode === 'chapter') startChapter(curChapterId);
    else startMixed();
  }
}

function startWrongOnly() {
  wrongOnly = true;
  idx = 0; correct = 0; answered = 0; answeredThis = false;
  const wKeys = Object.keys(wrongIds);
  deck = [];
  CHAPTERS.forEach(ch => {
    ch.questions.forEach((q, i) => {
      const key = `${ch.id}_${i}`;
      if (wKeys.includes(key)) deck.push({...q, _key: key, _chId: ch.id});
    });
  });
  if (shuffled) deck.sort(() => Math.random() - .5);
  updateTopbar();
  render();
}

function updateTopbar() {
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('progWrap').style.display = 'block';
  const ch = curChapterId ? CHAPTERS.find(c => c.id === curChapterId) : null;
  const tag = document.getElementById('chapterTag');
  tag.textContent = wrongOnly ? '错题本' : (mode === 'mixed' ? '混合练习' : (ch ? ch.title : '—'));
  tag.style.background = ch && mode !== 'mixed' ? COLORS[(ch.id-1) % COLORS.length] + '33' : '#2a2e42';
  document.getElementById('shuffleBtn').className = 'ctrl-btn' + (shuffled ? ' on' : '');
  const wCount = Object.keys(wrongIds).length;
  document.getElementById('wrongBtn').className = 'ctrl-btn' + (wrongOnly ? ' on' : '');
  document.getElementById('wrongCount').textContent = wCount > 0 ? `(${wCount})` : '';
  updateScore();
}

function updateScore() {
  document.getElementById('scoreNum').textContent = correct;
  document.getElementById('totalNum').textContent = answered;
  const pct = deck.length > 0 ? Math.round((idx / deck.length) * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
}

function render() {
  if (idx >= deck.length) { renderEnd(); return; }
  answeredThis = false;
  const q = deck[idx];
  const total = deck.length;
  updateScore();

  // Find chapter color
  const chId = q._chId || curChapterId;
  const chIdx = CHAPTERS.findIndex(c => c.id === chId);
  const color = COLORS[chIdx >= 0 ? chIdx % COLORS.length : 0];

  let optsHtml = q.o.map((o, i) =>
    `<button class="opt" id="opt${i}" onclick="pick(${i})"><span class="opt-lbl">${LABELS[i]}</span><span>${o}</span></button>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="qcard">
      <div class="qnum">题目 ${idx + 1} / ${total}</div>
      <div class="qtxt">${q.q}</div>
      <div class="opts">${optsHtml}</div>
      <div class="fb" id="fb"></div>
      <div class="nav">
        <button class="nav-btn" onclick="prevQ()" ${idx === 0 ? 'disabled' : ''}>← 上一题</button>
        <button class="nav-btn primary" id="nxtBtn" onclick="nextQ()" disabled>${idx === total - 1 ? '查看结果 →' : '下一题 →'}</button>
      </div>
    </div>
  `;
}

function pick(i) {
  if (answeredThis) return;
  answeredThis = true;
  const q = deck[idx];
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o => o.disabled = true);
  answered++;
  const fb = document.getElementById('fb');
  if (i === q.a) {
    correct++;
    opts[i].classList.add('correct');
    fb.textContent = '✓ 正确！';
    fb.className = 'fb ok';
    delete wrongIds[q._key];
  } else {
    opts[i].classList.add('wrong');
    opts[q.a].classList.add('reveal');
    fb.textContent = `✗ 错误，正确答案是 ${LABELS[q.a]}`;
    fb.className = 'fb no';
    wrongIds[q._key] = true;
  }
  document.getElementById('nxtBtn').disabled = false;
  updateScore();
  updateTopbar();
}

function nextQ() { idx++; answeredThis = false; render(); }
function prevQ() { if (idx > 0) { idx--; answeredThis = false; render(); } }

function renderEnd() {
  document.getElementById('progFill').style.width = '100%';
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  let grade, gcolor;
  if (pct >= 90) { grade = '优秀 🎉'; gcolor = '#3dba7c'; }
  else if (pct >= 75) { grade = '良好 👍'; gcolor = '#4e7ef7'; }
  else if (pct >= 60) { grade = '及格 📚'; gcolor = '#f5a623'; }
  else { grade = '需要复习 💪'; gcolor = '#e05a5a'; }
  const wCount = Object.keys(wrongIds).length;
  document.getElementById('content').innerHTML = `
    <div class="end">
      <div class="end-pct" style="color:${gcolor}">${pct}%</div>
      <div class="end-grade">${grade} · 共 ${answered} 题，答对 ${correct} 题</div>
      <div class="end-cards">
        <div class="end-card"><div class="end-n" style="color:var(--green)">${correct}</div><div class="end-l">答对</div></div>
        <div class="end-card"><div class="end-n" style="color:var(--red)">${answered - correct}</div><div class="end-l">答错</div></div>
        <div class="end-card"><div class="end-n" style="color:var(--amber)">${wCount}</div><div class="end-l">错题库</div></div>
      </div>
      <div class="end-btns">
        <button class="nav-btn" onclick="restartSame()">重新练习（本轮）</button>
        ${wCount > 0 ? `<button class="nav-btn primary" onclick="startWrongOnly()">专练错题 (${wCount}题)</button>` : ''}
        <button class="nav-btn" onclick="showWelcome();buildSidebar()">返回主页</button>
      </div>
    </div>
  `;
}

function restartSame() {
  if (wrongOnly) { startWrongOnly(); return; }
  if (mode === 'mixed') { startMixed(); return; }
  startChapter(curChapterId);
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', function(e) {
  // Ignore if focus is on a button/input to avoid conflicts
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // 1/2/3/4 → pick option A/B/C/D
  if (['1','2','3','4'].includes(e.key)) {
    const i = parseInt(e.key) - 1;
    const btn = document.getElementById('opt' + i);
    if (btn && !btn.disabled) pick(i);
    return;
  }
  // Space → next question (only if answered)
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    const nxt = document.getElementById('nxtBtn');
    if (nxt && !nxt.disabled) nextQ();
    return;
  }
});

init();
</script>

</body>
</html>
